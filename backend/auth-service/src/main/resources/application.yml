server:
  port: 8081

spring:
  application:
    name: auth-service

  # ── Base de datos ──────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:tfg_user}
    password: ${SPRING_DATASOURCE_PASSWORD:tfg_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── JPA / Hibernate ────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate      # Flyway gestiona el esquema; Hibernate solo valida
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # ── Flyway – migraciones versionadas ───────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ── Eureka Client ──────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10

# ── JWT ────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: ${JWT_EXPIRATION:3600000}           # 1 hora
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 días

# ── Actuator ───────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.tfg.esports.auth: DEBUG
    org.springframework.security: WARN
